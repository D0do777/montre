<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Configurateur Montre</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#f2f2f2;
}

.container {
    display:flex;
    height:100vh;
}

/* MENU */
.sidebar {
    width:30%;
    background:white;
    padding:20px;
    overflow-y:auto;
    border-right:1px solid #ddd;
}

.section {
    margin-bottom:25px;
}

.selector {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button {
    padding:8px 12px;
    cursor:pointer;
}

/* PREVIEW */
.preview {
    width:70%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.watch {
    position:relative;
    width:420px;
    height:420px;
}

.watch img {
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<!-- TYPE MONTRE -->
<div class="section">
<h3>Type montre</h3>
<div class="selector">
<button onclick="prev('type')">◀</button>
<span id="typeTxt"></span>
<button onclick="next('type')">▶</button>
</div>
</div>

<!-- BRACELET -->
<div class="section">
<h3>Bracelet</h3>
<div class="selector">
<button onclick="prev('bracelet')">◀</button>
<span id="braceletTxt"></span>
<button onclick="next('bracelet')">▶</button>
</div>
</div>

<!-- TYPE CADRAN -->
<div class="section">
<h3>Type cadran</h3>
<div class="selector">
<button onclick="prev('dialType')">◀</button>
<span id="dialTypeTxt"></span>
<button onclick="next('dialType')">▶</button>
</div>
</div>

<!-- COULEUR CADRAN -->
<div class="section">
<h3>Couleur cadran</h3>
<div class="selector">
<button onclick="prev('dialColor')">◀</button>
<span id="dialColorTxt"></span>
<button onclick="next('dialColor')">▶</button>
</div>
</div>

<!-- AIGUILLES -->
<div class="section">
<h3>Aiguilles</h3>
<div class="selector">
<button onclick="prev('hands')">◀</button>
<span id="handsTxt"></span>
<button onclick="next('hands')">▶</button>
</div>
</div>

</div>

<!-- PREVIEW -->
<div class="preview">
<div class="watch">
<img id="braceletImg">
<img id="dialImg">
<img id="handsImg">
</div>
</div>

</div>

<script>

/* CONFIGURATION */

const TYPES = ["nautilus","royaloak","datejust","daydate"];

const BRACELETS = {
    nautilus:["silver","gold","black"],
    royaloak:["silver","gold"],
    datejust:["jubilee","oyster"],
    daydate:["president","gold"]
};

const DIAL_TYPES = ["arabic","baton","roman","openheart","classic"];

const DIAL_COLORS = {
    arabic:["black","blue","green"],
    baton:["black","silver"],
    roman:["white","black"],
    openheart:["black","blue"],
    classic:["white","gold","black"]
};

const HANDS = ["classic","mercedes","sport"];

/* STATE */

let state = {
    type:0,
    bracelet:0,
    dialType:0,
    dialColor:0,
    hands:0
};

/* HELPERS */

function getType(){ return TYPES[state.type]; }
function getBracelets(){ return BRACELETS[getType()]; }
function getDialType(){ return DIAL_TYPES[state.dialType]; }
function getDialColors(){ return DIAL_COLORS[getDialType()]; }

/* NAVIGATION */

function next(cat){

    if(cat==="type"){
        state.type=(state.type+1)%TYPES.length;
        state.bracelet=0;
    }

    if(cat==="bracelet"){
        state.bracelet=(state.bracelet+1)%getBracelets().length;
    }

    if(cat==="dialType"){
        state.dialType=(state.dialType+1)%DIAL_TYPES.length;
        state.dialColor=0;
    }

    if(cat==="dialColor"){
        state.dialColor=(state.dialColor+1)%getDialColors().length;
    }

    if(cat==="hands"){
        state.hands=(state.hands+1)%HANDS.length;
    }

    update();
}

function prev(cat){

    if(cat==="type"){
        state.type=(state.type-1+TYPES.length)%TYPES.length;
        state.bracelet=0;
    }

    if(cat==="bracelet"){
        state.bracelet=(state.bracelet-1+getBracelets().length)%getBracelets().length;
    }

    if(cat==="dialType"){
        state.dialType=(state.dialType-1+DIAL_TYPES.length)%DIAL_TYPES.length;
        state.dialColor=0;
    }

    if(cat==="dialColor"){
        state.dialColor=(state.dialColor-1+getDialColors().length)%getDialColors().length;
    }

    if(cat==="hands"){
        state.hands=(state.hands-1+HANDS.length)%HANDS.length;
    }

    update();
}

/* UPDATE */

function update(){

    document.getElementById("typeTxt").innerText = getType();
    document.getElementById("braceletTxt").innerText = getBracelets()[state.bracelet];
    document.getElementById("dialTypeTxt").innerText = getDialType();
    document.getElementById("dialColorTxt").innerText = getDialColors()[state.dialColor];
    document.getElementById("handsTxt").innerText = HANDS[state.hands];

    document.getElementById("braceletImg").src =
        "assets/bracelets/" + getType() + "/" + getBracelets()[state.bracelet] + ".png";

    document.getElementById("dialImg").src =
        "assets/dials/" + getDialType() + "/" + getDialColors()[state.dialColor] + ".png";

    document.getElementById("handsImg").src =
        "assets/hands/" + HANDS[state.hands] + ".png";
}

update();

</script>

</body>
</html>
